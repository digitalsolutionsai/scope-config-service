name: Build and Push Docker Image

on:
  push:
    tags:
      - '*-prd'  # Triggers on tags ending with -prd, e.g., 2511.02.1-prd

env:
  REGISTRY: asia-southeast1-docker.pkg.dev
  PROJECT_ID: dsai-production
  REPOSITORY: scope-config-service
  IMAGE_NAME: scope-config-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production  # Use the production environment for secrets
    
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag name
        id: extract_tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building image with tag: $TAG"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.extract_tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image digest
        run: echo "Image pushed successfully with tag ${{ steps.extract_tag.outputs.tag }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production  # This provides manual approval requirement
    
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch tags

      - name: Extract tag name
        id: extract_tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying version: $TAG"

      - name: Get tag message
        id: get_tag_message
        run: |
          TAG_MESSAGE=$(git tag -l --format='%(contents)' ${{ steps.extract_tag.outputs.tag }})
          # Escape newlines for JSON
          TAG_MESSAGE="${TAG_MESSAGE//'%'/'%25'}"
          TAG_MESSAGE="${TAG_MESSAGE//$'\n'/'\n'}"
          TAG_MESSAGE="${TAG_MESSAGE//$'\r'/'\r'}"
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Slack notification on deployment start
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚀 Deployment Started: scope-config-service - ${{ steps.extract_tag.outputs.tag }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Deployment Started: scope-config-service"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Service:*\n`scope-config-service`" },
                    { "type": "mrkdwn", "text": "*Version:*\n`${{ steps.extract_tag.outputs.tag }}`" }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Release Notes:*\n```${{ steps.get_tag_message.outputs.message }}```"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Deploy to production instance
        env:
          INSTANCE_NAME: ${{ vars.GCP_INSTANCE_NAME }}
          INSTANCE_ZONE: ${{ vars.GCP_INSTANCE_ZONE }}
          TAG_VERSION: ${{ steps.extract_tag.outputs.tag }}
          SERVICE_NAME: ${{ vars.DOCKER_SERVICE_NAME || 'scope-config-service' }}
        run: |
          echo "Deploying to instance: $INSTANCE_NAME in zone: $INSTANCE_ZONE"
          echo "Service: $SERVICE_NAME"
          echo "Version: $TAG_VERSION"
          
          # Create deployment command with variable substitution
          DEPLOY_COMMAND="set -e && \
          echo '=== Navigating to docker-compose directory ===' && \
          cd /opt/docker-compose && \
          echo '=== Current .env version ===' && \
          grep SCOPE_CONFIG_SERVICE_VERSION .env || echo 'SCOPE_CONFIG_SERVICE_VERSION not found' && \
          echo '=== Updating .env file with new version ===' && \
          if grep -q '^SCOPE_CONFIG_SERVICE_VERSION=' .env; then \
            sudo sed -i 's/^SCOPE_CONFIG_SERVICE_VERSION=.*/SCOPE_CONFIG_SERVICE_VERSION=${TAG_VERSION}/' .env; \
          else \
            echo 'SCOPE_CONFIG_SERVICE_VERSION=${TAG_VERSION}' | sudo tee -a .env; \
          fi && \
          echo '=== New .env version ===' && \
          grep SCOPE_CONFIG_SERVICE_VERSION .env && \
          echo '=== Pulling Docker image for service: ${SERVICE_NAME} ===' && \
          sudo docker compose pull ${SERVICE_NAME} && \
          echo '=== Restarting service: ${SERVICE_NAME} ===' && \
          sudo docker compose up -d ${SERVICE_NAME} && \
          echo '=== Cleaning up old Docker images ===' && \
          CONTAINER_ID=\$(sudo docker compose ps -q ${SERVICE_NAME} | head -1) && \
          CURRENT_IMAGE_ID=\$(sudo docker inspect --format='{{.Image}}' \"\$CONTAINER_ID\" 2>/dev/null | sed 's/sha256://') && \
          IMAGE_REPO=\$(sudo docker inspect --format='{{.Config.Image}}' \"\$CONTAINER_ID\" 2>/dev/null | sed 's/:.*//') && \
          echo \"Current running image ID: \$CURRENT_IMAGE_ID\" && \
          echo \"Image repository from running service: \$IMAGE_REPO\" && \
          sudo docker images \"\$IMAGE_REPO\" --format '{{.ID}} {{.Repository}}:{{.Tag}}' --no-trunc | while read IMAGE_ID IMAGE_TAG; do \
            SHORT_IMAGE_ID=\$(echo \"\$IMAGE_ID\" | sed 's/sha256://') && \
            if [ \"\$SHORT_IMAGE_ID\" != \"\$CURRENT_IMAGE_ID\" ]; then \
              echo \"Removing old image: \$IMAGE_TAG\" && \
              if ! sudo docker rmi -f \"\$IMAGE_ID\" 2>&1; then \
                echo \"Warning: Failed to remove image \$IMAGE_TAG, it may be in use by another container\"; \
              fi; \
            else \
              echo \"Keeping current image: \$IMAGE_TAG\"; \
            fi; \
          done && \
          echo '=== Pruning dangling images ===' && \
          sudo docker image prune -f && \
          echo '=== Deployment completed successfully ==='"
          
          # Replace placeholders with actual values
          DEPLOY_COMMAND="${DEPLOY_COMMAND//\$\{TAG_VERSION\}/$TAG_VERSION}"
          DEPLOY_COMMAND="${DEPLOY_COMMAND//\$\{SERVICE_NAME\}/$SERVICE_NAME}"
          
          # SSH to instance and deploy
          gcloud compute ssh "$INSTANCE_NAME" \
            --zone="$INSTANCE_ZONE" \
            --tunnel-through-iap \
            --command="$DEPLOY_COMMAND"
      
      - name: Send Slack notification on success
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "✅ Deployment Successful",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Deployment Successful"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n${{ steps.extract_tag.outputs.tag }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Environment:*\nProduction"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      
      - name: Send Slack notification on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ Deployment Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Deployment Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n${{ steps.extract_tag.outputs.tag }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Environment:*\nProduction"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "⚠️ *Action Required:* Please check the workflow logs for details."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "style": "danger"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
