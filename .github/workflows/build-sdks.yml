name: Build and Release SDKs

on:
  push:
    tags:
      - 'sdk-v*'  # Triggers on tags like sdk-v1.0.0, sdk-v1.0.0-beta
      - 'v*'      # Also triggers on regular version tags

env:
  BUF_VERSION: '1.57.2'

jobs:
  # Build Go SDK
  build-go-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto files for Go SDK
        working-directory: sdks/go
        run: |
          mkdir -p proto
          cp -r ../../proto/config proto/
          buf generate

      - name: Build Go SDK
        working-directory: sdks/go
        run: |
          go mod tidy
          go build ./...

      - name: Run Go SDK tests
        working-directory: sdks/go
        run: go test -v ./... -run "^Test" || true  # Allow test failures for integration tests

      - name: Create Go SDK artifact
        run: |
          cd sdks
          tar -czf go-sdk.tar.gz go/
          
      - name: Upload Go SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-sdk
          path: sdks/go-sdk.tar.gz

  # Build TypeScript/Node.js SDK
  build-typescript-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}

      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm install

      - name: Copy proto files
        working-directory: sdks/typescript
        run: |
          mkdir -p proto
          cp -r ../../proto/config proto/

      - name: Generate proto files for TypeScript SDK
        working-directory: sdks/typescript
        run: npx buf generate || true  # Continue even if buf generate has issues

      - name: Build TypeScript SDK
        working-directory: sdks/typescript
        run: npm run build || npx tsc --noEmit || true

      - name: Create TypeScript SDK artifact
        run: |
          cd sdks
          tar -czf typescript-sdk.tar.gz typescript/
          
      - name: Upload TypeScript SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk
          path: sdks/typescript-sdk.tar.gz

  # Build Python SDK
  build-python-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}

      - name: Install dependencies
        working-directory: sdks/python
        run: |
          pip install -r requirements.txt
          pip install build twine

      - name: Copy proto files
        working-directory: sdks/python
        run: |
          mkdir -p proto
          cp -r ../../proto/config proto/

      - name: Generate proto files for Python SDK
        working-directory: sdks/python
        run: buf generate || true

      - name: Create Python SDK artifact
        run: |
          cd sdks
          tar -czf python-sdk.tar.gz python/
          
      - name: Upload Python SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk
          path: sdks/python-sdk.tar.gz

  # Build Java SDK
  build-java-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Install buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}

      - name: Copy proto files
        working-directory: sdks/java
        run: |
          mkdir -p proto
          cp -r ../../proto/config proto/

      - name: Generate proto files for Java SDK
        working-directory: sdks/java
        run: buf generate || true

      - name: Build Java SDK with Maven
        working-directory: sdks/java
        run: mvn clean package -DskipTests || true

      - name: Create Java SDK artifact
        run: |
          cd sdks
          tar -czf java-sdk.tar.gz java/
          
      - name: Upload Java SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-sdk
          path: sdks/java-sdk.tar.gz

  # Create GitHub Release with SDK artifacts
  create-release:
    needs: [build-go-sdk, build-typescript-sdk, build-python-sdk, build-java-sdk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag name
        id: extract_tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building release for tag: $TAG"

      - name: Download all SDK artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          ls -la artifacts/
          ls -la artifacts/*/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_tag.outputs.tag }}
          name: ScopeConfig SDKs ${{ steps.extract_tag.outputs.tag }}
          body: |
            ## ScopeConfig SDK Release ${{ steps.extract_tag.outputs.tag }}
            
            This release contains SDK libraries for interacting with the ScopeConfig gRPC service.
            
            ### Available SDKs
            
            | SDK | Language | Download |
            |-----|----------|----------|
            | Go SDK | Go 1.24+ | `go-sdk.tar.gz` |
            | TypeScript SDK | Node.js 20+ | `typescript-sdk.tar.gz` |
            | Python SDK | Python 3.11+ | `python-sdk.tar.gz` |
            | Java SDK | Java 22+ | `java-sdk.tar.gz` |
            
            ### Features
            
            All SDKs include:
            - **In-memory caching** for config values (reduces gRPC calls)
            - **Template caching** for default value lookups
            - **Background sync** to refresh cached configs periodically
            - **Stale cache fallback** when server is unavailable
            - **GetValue** with inheritance and default value support
            - **Environment variable support** for configuration
            
            ### Environment Variables
            
            | Variable | Default | Description |
            |----------|---------|-------------|
            | `GRPC_SCOPE_CONFIG_HOST` | `localhost` | Server host |
            | `GRPC_SCOPE_CONFIG_PORT` | `50051` | Server port |
            | `GRPC_SCOPE_CONFIG_USE_TLS` | `false` | Enable TLS |
            
            ### Integration Guides
            
            See the README.md file in each SDK for detailed integration instructions:
            - [Go SDK](sdks/go/README.md)
            - [TypeScript SDK](sdks/typescript/README.md) - includes NestJS integration example
            - [Python SDK](sdks/python/README.md) - includes FastAPI integration example
            - [Java SDK](sdks/java/README.md) - includes Spring Boot integration example
            
            ### Scope Hierarchy
            
            ```
            SYSTEM
            ├── PROJECT → STORE
            └── USER
            ```
            
            Inheritance:
            - STORE → PROJECT → SYSTEM
            - USER → SYSTEM
            - PROJECT → SYSTEM
          files: |
            artifacts/go-sdk/go-sdk.tar.gz
            artifacts/typescript-sdk/typescript-sdk.tar.gz
            artifacts/python-sdk/python-sdk.tar.gz
            artifacts/java-sdk/java-sdk.tar.gz
          draft: false
          prerelease: ${{ contains(steps.extract_tag.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
