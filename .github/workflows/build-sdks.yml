name: Build and Release SDKs

on:
  push:
    tags:
      - 'sdks/go/v*' # Go SDK specific tags
      - 'sdks/typescript/v*' # TypeScript SDK specific tags
      - 'sdks/python/v*' # Python SDK specific tags
      - 'sdks/java/v*' # Java SDK specific tags

env:
  BUF_VERSION: '1.57.2'

jobs:
  # Build Go SDK
  build-go-sdk:
    if: startsWith(github.ref, 'refs/tags/sdks/go/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto files for Go SDK
        working-directory: sdks/go
        run: |
          mkdir -p proto
          cp -r ../../proto/config proto/
          buf generate proto

      - name: Build Go SDK
        working-directory: sdks/go
        run: |
          go mod tidy
          go build ./...

      - name: Run Go SDK tests
        working-directory: sdks/go
        run: go test -v -short ./...

      - name: Create Go SDK artifact
        run: |
          cd sdks
          tar -czf go-sdk.tar.gz go/
          
      - name: Upload Go SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-sdk
          path: sdks/go-sdk.tar.gz

  # Build TypeScript/Node.js SDK
  build-typescript-sdk:
    if: startsWith(github.ref, 'refs/tags/sdks/typescript/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@digitalsolutionsai'

      - name: Install buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}

      - name: Extract version from tag
        id: extract_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Expects tag format: sdks/typescript/v1.0.0
          VERSION=${TAG#sdks/typescript/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update package.json version
        working-directory: sdks/typescript
        run: |
          npm version ${{ steps.extract_version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm ci

      - name: Copy proto files
        working-directory: sdks/typescript
        run: |
          mkdir -p proto
          cp -r ../../proto/config proto/

      - name: Generate proto files for TypeScript SDK
        working-directory: sdks/typescript
        run: npx buf generate || true  # Continue even if buf generate has issues

      - name: Build TypeScript SDK
        working-directory: sdks/typescript
        run: npm run build

      - name: Publish to GitHub Packages
        working-directory: sdks/typescript
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create TypeScript SDK artifact
        run: |
          cd sdks
          tar -czf typescript-sdk.tar.gz typescript/
          
      - name: Upload TypeScript SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk
          path: sdks/typescript-sdk.tar.gz

  # Build Python SDK
  build-python-sdk:
    if: startsWith(github.ref, 'refs/tags/sdks/python/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}

      - name: Install dependencies
        working-directory: sdks/python
        run: |
          pip install -r requirements.txt
          pip install build twine

      - name: Copy proto files
        working-directory: sdks/python
        run: |
          mkdir -p proto
          cp -r ../../proto/config proto/

      - name: Generate proto files for Python SDK
        working-directory: sdks/python
        run: buf generate || true

      - name: Create Python SDK artifact
        run: |
          cd sdks
          tar -czf python-sdk.tar.gz python/
          
      - name: Upload Python SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk
          path: sdks/python-sdk.tar.gz

  # Build Java SDK
  build-java-sdk:
    if: startsWith(github.ref, 'refs/tags/sdks/java/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Install buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}

      - name: Copy proto files
        working-directory: sdks/java
        run: |
          mkdir -p proto
          cp -r ../../proto/config proto/

      - name: Generate proto files for Java SDK
        working-directory: sdks/java
        run: buf generate || true

      - name: Build Java SDK with Maven
        working-directory: sdks/java
        run: mvn clean package -DskipTests || true

      - name: Create Java SDK artifact
        run: |
          cd sdks
          tar -czf java-sdk.tar.gz java/
          
      - name: Upload Java SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-sdk
          path: sdks/java-sdk.tar.gz

  # Create GitHub Release with SDK artifacts
  create-release:
    needs: [build-go-sdk, build-typescript-sdk, build-python-sdk, build-java-sdk]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag name
        id: extract_tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building release for tag: $TAG"

      - name: Download all SDK artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          ls -la artifacts/
          find artifacts -type f -print

      - name: Prepare release content
        id: prepare_release
        run: |
          BODY="## ScopeConfig SDK Release ${{ steps.extract_tag.outputs.tag }}\n\nThis release contains SDK libraries for interacting with the ScopeConfig gRPC service.\n\n"
          ASSETS=""

          if [ -f "artifacts/go-sdk/go-sdk.tar.gz" ]; then
            ASSETS="${ASSETS}artifacts/go-sdk/go-sdk.tar.gz\n"
          fi
          if [ -f "artifacts/typescript-sdk/typescript-sdk.tar.gz" ]; then
            ASSETS="${ASSETS}artifacts/typescript-sdk/typescript-sdk.tar.gz\n"
          fi
          if [ -f "artifacts/python-sdk/python-sdk.tar.gz" ]; then
            ASSETS="${ASSETS}artifacts/python-sdk/python-sdk.tar.gz\n"
          fi
          if [ -f "artifacts/java-sdk/java-sdk.tar.gz" ]; then
            ASSETS="${ASSETS}artifacts/java-sdk/java-sdk.tar.gz\n"
          fi
          
          if [ -n "$ASSETS" ]; then
            BODY="${BODY}### Available SDKs\n\n| SDK | Language | Download |\n|-----|----------|----------|\n"
            if [ -f "artifacts/go-sdk/go-sdk.tar.gz" ]; then
              BODY="${BODY}| Go SDK | Go 1.24+ | \`go-sdk.tar.gz\` |\n"
            fi
            if [ -f "artifacts/typescript-sdk/typescript-sdk.tar.gz" ]; then
              BODY="${BODY}| TypeScript SDK | Node.js 20+ | \`typescript-sdk.tar.gz\` |\n"
            fi
            if [ -f "artifacts/python-sdk/python-sdk.tar.gz" ]; then
              BODY="${BODY}| Python SDK | Python 3.11+ | \`python-sdk.tar.gz\` |\n"
            fi
            if [ -f "artifacts/java-sdk/java-sdk.tar.gz" ]; then
              BODY="${BODY}| Java SDK | Java 22+ | \`java-sdk.tar.gz\` |\n"
            fi
          fi

          STATIC_BODY="\n### Features\n\nAll SDKs include:\n- **In-memory caching** for config values (reduces gRPC calls)\n- **Template caching** for default value lookups\n- **Background sync** to refresh cached configs periodically\n- **Stale cache fallback** when server is unavailable\n- **GetValue** with inheritance and default value support\n- **Environment variable support** for configuration\n\n### Environment Variables\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| \`GRPC_SCOPE_CONFIG_HOST\` | \`localhost\` | Server host |\n| \`GRPC_SCOPE_CONFIG_PORT\` | \`50051\` | Server port |\n| \`GRPC_SCOPE_CONFIG_USE_TLS\` | \`false\` | Enable TLS |\n\n### Integration Guides\n\nSee the README.md file in each SDK for detailed integration instructions:\n- [Go SDK](sdks/go/README.md)\n- [TypeScript SDK](sdks/typescript/README.md) - includes NestJS integration example\n- [Python SDK](sdks/python/README.md) - includes FastAPI integration example\n- [Java SDK](sdks/java/README.md) - includes Spring Boot integration example\n\n### Scope Hierarchy\n\n\`\`\`\nSYSTEM\n├── PROJECT → STORE\n└── USER\n\`\`\`\n\nInheritance:\n- STORE → PROJECT → SYSTEM\n- USER → SYSTEM\n- PROJECT → SYSTEM\n"
          BODY="${BODY}${STATIC_BODY}"
          
          echo "assets<<EOF" >> "${GITHUB_OUTPUT}"
          echo -e "$ASSETS" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

          echo "body<<EOF" >> "${GITHUB_OUTPUT}"
          echo -e "$BODY" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_tag.outputs.tag }}
          name: ScopeConfig SDKs ${{ steps.extract_tag.outputs.tag }}
          body: ${{ steps.prepare_release.outputs.body }}
          files: ${{ steps.prepare_release.outputs.assets }}
          draft: false
          prerelease: ${{ contains(steps.extract_tag.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
