name: Build Go SDK

on:
  push:
    tags:
      - 'sdks/go/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: false

env:
  BUF_VERSION: '1.57.2'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto files for Go SDK
        working-directory: sdks/go
        run: |
          mkdir -p proto
          cp -r ../../proto/config proto/
          buf generate proto

      - name: Build Go SDK
        working-directory: sdks/go
        run: |
          go mod tidy
          go build ./...

      - name: Run Go SDK tests
        working-directory: sdks/go
        run: go test -v -short ./...

      - name: Create Go SDK artifact
        run: |
          cd sdks
          tar -czf go-sdk.tar.gz go/
          
      - name: Upload Go SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-sdk
          path: sdks/go-sdk.tar.gz
