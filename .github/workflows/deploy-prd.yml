name: Build and Push Docker Image

on:
  push:
    tags:
      - '*-prd'  # Triggers on tags ending with -prd, e.g., 2511.02.1-prd

env:
  REGISTRY: asia-southeast1-docker.pkg.dev
  PROJECT_ID: dsai-production
  REPOSITORY: scope-config-service
  IMAGE_NAME: scope-config-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production  # Use the production environment for secrets
    outputs:
      image_size_mb: ${{ steps.image_size.outputs.size_mb }}

    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag name
        id: extract_tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building image with tag: $TAG"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.extract_tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Get image size
        id: image_size
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.extract_tag.outputs.tag }}"
          docker pull "$IMAGE_REF"
          SIZE_BYTES=$(docker inspect "$IMAGE_REF" --format='{{.Size}}')
          SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $SIZE_BYTES/1024/1024}")
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT
          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT
          echo "Image size: ${SIZE_MB} MB"

      - name: Image digest
        run: echo "Image pushed successfully with tag ${{ steps.extract_tag.outputs.tag }} (Size - ${{ steps.image_size.outputs.size_mb }} MB)"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production  # This provides manual approval requirement
    
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch tags

      - name: Extract tag name
        id: extract_tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying version: $TAG"

      - name: Get tag message
        id: get_tag_message
        run: |
          TAG_MESSAGE=$(git tag -l --format='%(contents)' ${{ steps.extract_tag.outputs.tag }})
          # Escape newlines for JSON
          TAG_MESSAGE="${TAG_MESSAGE//'%'/'%25'}"
          TAG_MESSAGE="${TAG_MESSAGE//$'\n'/'\n'}"
          TAG_MESSAGE="${TAG_MESSAGE//$'\r'/'\r'}"
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Slack notification on deployment start
        uses: ./.github/actions/slack-notify
        with:
          status: 'started'
          environment: 'Production'
          version: ${{ steps.extract_tag.outputs.tag }}
          image_size: ${{ needs.build-and-push.outputs.image_size_mb }} MB
          custom_message: ${{ steps.get_tag_message.outputs.message }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Deploy to K3s production cluster
        id: k3s_deploy
        env:
          INSTANCE_NAME: ${{ vars.GCP_INSTANCE_NAME }}
          INSTANCE_ZONE: ${{ vars.GCP_INSTANCE_ZONE }}
          TAG_VERSION: ${{ steps.extract_tag.outputs.tag }}
          SERVICE_NAME: "config-service"
          IMAGE_PATH: "asia-southeast1-docker.pkg.dev/dsai-production/scope-config-service/scope-config-service"
        run: |
          echo "Deploying to instance: $INSTANCE_NAME in zone: $INSTANCE_ZONE"
          echo "Service: $SERVICE_NAME"
          echo "Version: $TAG_VERSION"
          
          # Create deployment command using kubectl to natively update K3s deployment
          DEPLOY_COMMAND="export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && \
          echo '=== Initiating rolling update for deployment/${SERVICE_NAME} ===' && \
          sudo kubectl set image deployment/${SERVICE_NAME} ${SERVICE_NAME}=${IMAGE_PATH}:${TAG_VERSION} -n dsai-prd && \
          echo '=== Waiting for rollout to complete ===' && \
          sudo kubectl rollout status deployment/${SERVICE_NAME} -n dsai-prd --timeout=120s && \
          echo '=== Wait 10s for old pods to terminate ===' && \
          sleep 10 && \
          echo '=== Pruning unused images from containerd ===' && \
          sudo k3s crictl rmi --prune || true && \
          POD_NAMES=\$(sudo kubectl get pods -n dsai-prd -l app=${SERVICE_NAME} --no-headers -o custom-columns=\":metadata.name\" | paste -sd, -) && \
          echo \"PODS_LIST=\$POD_NAMES\" && \
          echo '=== Deployment completed successfully ==='"
          
          # SSH to instance and deploy
          OUTPUT=$(gcloud compute ssh "$INSTANCE_NAME" \
            --zone="$INSTANCE_ZONE" \
            --tunnel-through-iap \
            --command="$DEPLOY_COMMAND")
            
          echo "$OUTPUT"
          
          # Extract pods list and expose it to other steps
          PODS=$(echo "$OUTPUT" | grep -oP '(?<=^PODS_LIST=).*' || true)
          if [ -z "$PODS" ]; then
            PODS="Unknown (Failed to parse pods)"
          fi
          echo "pods=$PODS" >> $GITHUB_OUTPUT
      
      - name: Send Slack notification on success
        if: success()
        uses: ./.github/actions/slack-notify
        with:
          status: 'success'
          environment: 'Production'
          version: ${{ steps.extract_tag.outputs.tag }}
          image_size: ${{ needs.build-and-push.outputs.image_size_mb }} MB
          custom_message: |
            ${{ steps.get_tag_message.outputs.message }}
            
            Pods: ${{ steps.k3s_deploy.outputs.pods }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Send Slack notification on failure
        if: failure()
        uses: ./.github/actions/slack-notify
        with:
          status: 'failure'
          environment: 'Production'
          version: ${{ steps.extract_tag.outputs.tag }}
          image_size: ${{ needs.build-and-push.outputs.image_size_mb }} MB
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
