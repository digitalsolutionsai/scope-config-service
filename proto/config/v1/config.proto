syntax = "proto3";

package vn.dsai.config.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/digitalsolutionsai/scope-config-service/config/v1;configv1";
option java_package = "vn.dsai.config.v1";
option java_multiple_files = true;
option java_outer_classname = "ConfigProto";

// ConfigService is the main service for managing and retrieving configurations.
service ConfigService {
  // Retrieves the configuration for the published version.
  rpc GetConfig(GetConfigRequest) returns (ScopeConfig);

  // Retrieves the configuration for the latest (most recent) version, published or not.
  rpc GetLatestConfig(GetConfigRequest) returns (ScopeConfig);

  // Retrieves a configuration by a specific version number.
  rpc GetConfigByVersion(GetConfigByVersionRequest) returns (ScopeConfig);

  // Retrieves the version history for a configuration.
  rpc GetConfigHistory(GetConfigHistoryRequest) returns (GetConfigHistoryResponse);

  // Updates or creates a new configuration set. This will be validated against a template if one exists.
  rpc UpdateConfig(UpdateConfigRequest) returns (ScopeConfig);

  // Marks a specific version as "published" for client consumption.
  rpc PublishVersion(PublishVersionRequest) returns (ConfigVersion);

  // Deletes a configuration set and all of its associated versions.
  rpc DeleteConfig(DeleteConfigRequest) returns (google.protobuf.Empty);

  // Applies a configuration template (schema) to a config identifier.
  rpc ApplyConfigTemplate(ApplyConfigTemplateRequest) returns (ConfigTemplate);

  // Retrieves the configuration template for a given identifier.
  rpc GetConfigTemplate(GetConfigTemplateRequest) returns (ConfigTemplate);

  // Retrieves a list of configuration templates.
  rpc ListConfigTemplates(ListConfigTemplatesRequest) returns (ListConfigTemplatesResponse);
}

// === ENUMS ===

enum Scope {
  SCOPE_UNSPECIFIED = 0;
  SYSTEM = 1;   // System-wide default configuration. scope_id should be 'default'.
  PROJECT = 2;  // Project-specific configuration.
  STORE = 3;    // Store-specific configuration.
  USER = 4;     // User-specific configuration.
}

enum FieldType {
  FIELD_TYPE_UNSPECIFIED = 0;
  STRING = 1;
  INT = 2;
  FLOAT = 3;
  BOOLEAN = 4;
  JSON = 5;
  ARRAY_STRING = 6; // Example for an array type
  SECRET = 7;       // Sensitive field - UI should mask/hide value
  HTML = 8;         // HTML content
  TEXTAREA = 9;     // Multi-line plain text
  MARKDOWN = 10;    // Markdown content
}

// === MODELS ===

// A unique identifier for a configuration set.
message ConfigIdentifier {
  string service_name = 1; // Required. Name of the service owning the config (e.g., "payment-service").
  Scope scope = 2;         // Required. The scope of the configuration.
  string group_id = 3;     // Required.
  string project_id = 4;   // (Optional) Project ID (max 20 chars).
  string store_id = 5;     // (Optional) Store ID (max 20 chars).
  string user_id = 6;      // (Optional) User ID (max 36 chars, e.g., UUID).
}

// Represents a configuration version.
message ConfigVersion {
  int32 id = 1;
  ConfigIdentifier identifier = 2;
  int32 latest_version = 3;
  int32 published_version = 4;
  google.protobuf.Timestamp created_at = 5;
  string created_by = 6;
  google.protobuf.Timestamp updated_at = 7;
  string updated_by = 8;
}

// A specific configuration field with its value.
message ConfigField {
  string path = 1;          // The key of the config (e.g., "database.postgres.connection_string").
  string value = 2;         // The value, stored as a string.
  FieldType type = 3;       // Data type to help clients parse the value.
}

// Represents a complete configuration set at a specific version.
message ScopeConfig {
  ConfigVersion version_info = 1;
  int32 current_version = 2; // The version number of the accompanying fields.
  repeated ConfigField fields = 3;
}

// === TEMPLATE MODELS ===

// A predefined choice for a configuration field, used for creating dropdowns in UIs.
message ValueOption {
    string value = 1; // The actual value to be stored.
    string label = 2; // The human-readable label for the UI.
}

// Defines the schema for a single configuration field.
message ConfigFieldTemplate {
    string path = 1;           // The key (e.g., "payment.provider.name").
    string label = 2;          // The display name for UIs (e.g., "Payment Provider").
    string description = 3;    // A helpful description for the user.
    FieldType type = 4;        // The data type (STRING, INT, etc.).
    string default_value = 5;  // Default value for this field.
    repeated Scope display_on = 6; // Defines which scopes can set this value (STORE, PROJECT, etc.).
    repeated ValueOption options = 7; // A list of predefined options for this field.
    int32 sort_order = 8;      // Optional sort order for displaying fields (use 6-digit numbers for easy modification).
}

// A container that a groups all field templates for a specific service_name and group_id.
message ConfigTemplate {
    ConfigIdentifier identifier = 1;
    string service_label = 2;
    string group_label = 3;
    string group_description = 4;
    repeated ConfigFieldTemplate fields = 5;
    int32 sort_order = 6;      // Optional sort order for displaying groups (use 6-digit numbers for easy modification).
}


// === REQUESTS & RESPONSES ===

message GetConfigRequest {
  ConfigIdentifier identifier = 1;
  // Optional: If specified, only the field with this path will be returned.
  // If omitted, all fields for the group will be returned.
  string path = 2;
  // Optional: If true or not set, returns template default values when no config exists.
  // If false, returns empty fields when no config exists.
  optional bool use_template_defaults = 3;
}

message GetConfigByVersionRequest {
  ConfigIdentifier identifier = 1;
  int32 version = 2;
  // Optional: If specified, only the field with this path will be returned.
  // If omitted, all fields for the group will be returned.
  string path = 3;
  // Optional: If true or not set, returns template default values when no config exists.
  // If false, returns empty fields when no config exists.
  optional bool use_template_defaults = 4;
}

message UpdateConfigRequest {
  ConfigIdentifier identifier = 1;
  repeated ConfigField fields = 2;
  string user = 3; // The user making the change.
}

message PublishVersionRequest {
  ConfigIdentifier identifier = 1;
  int32 version_to_publish = 2;
  string user = 3;
}

message DeleteConfigRequest {
  ConfigIdentifier identifier = 1;
}

message GetConfigHistoryRequest {
  ConfigIdentifier identifier = 1;
  int32 limit = 2;
}

message VersionHistoryEntry {
    int32 version = 1;
    google.protobuf.Timestamp created_at = 2;
    string created_by = 3;
    optional google.protobuf.Timestamp published_at = 4;
    optional string published_by = 5;
}

message GetConfigHistoryResponse {
  repeated VersionHistoryEntry history = 1;
}

message ApplyConfigTemplateRequest {
  ConfigTemplate template = 1;
  string user = 2;
}

message GetConfigTemplateRequest {
  ConfigIdentifier identifier = 1;
}

message ListConfigTemplatesRequest {
  // Optional: Filter by service name.
  string service_name = 1;
  // Optional: Filter by is_active status. If not set, returns all templates.
  optional bool is_active = 2;
}

message ListConfigTemplatesResponse {
  repeated ConfigTemplate templates = 1;
}

