services:
  config-service:
    # For local development, use: docker compose up --build
    # For Docker Hub image, comment out 'build' and uncomment 'image':
    # image: digitalsolutionsai/scope-config-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - GRPC_PORT=50051
      - HTTP_PORT=8080
      # Authentication is handled at the API Gateway level
    ports:
      - "50051:50051"  # gRPC port
      - "8080:8080"    # HTTP port
    volumes:
      - config_data:/app/data  # Persistent storage for SQLite (used when DATABASE_URL is not set)
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/swagger/doc.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - scopeconfig_network

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRESQL_FORWARD_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - scopeconfig_network

networks:
  scopeconfig_network:
    driver: bridge
volumes:
  config_data:
  postgres_data:
