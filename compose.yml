services:
  config-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - GRPC_PORT=50051
      - HTTP_PORT=8080
      # Authentication is handled at the API Gateway level
    ports:
      - "50051:50051"  # gRPC port
      - "8080:8080"    # HTTP port
    volumes:
      - config_data:/app/data  # Persistent storage for SQLite (used when DATABASE_URL is not set)
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - postgres_network

volumes:
  config_data:

networks:
  postgres_network:
    driver: bridge
