service:
  id: "notification"
  label: "Notification Service"

groups:
  - id: "subscriptions"
    label: "Notification Subscriptions"
    description: "Configuration for user notification subscriptions."
    sortOrder: 100000
    fields:
      - path: "promotion"
        label: "Promotions"
        description: "Receive promotional offers and news."
        type: "BOOLEAN"
        defaultValue: "true"
        sortOrder: 100000
        displayOn:
          - "SYSTEM"
          - "USER"
      - path: "order"
        label: "Order Updates"
        description: "Receive updates about your orders."
        type: "BOOLEAN"
        defaultValue: "true"
        sortOrder: 200000
        displayOn:
          - "SYSTEM"
          - "USER"
      - path: "system-alert"
        label: "System Alerts"
        description: "Receive critical alerts about system status."
        type: "BOOLEAN"
        defaultValue: "true"
        sortOrder: 300000
        displayOn:
          - "SYSTEM"
          - "USER"
      - path: "system-update"
        label: "System Updates"
        description: "Receive notifications about new features and system updates."
        type: "BOOLEAN"
        defaultValue: "false"
        sortOrder: 400000
        displayOn:
          - "SYSTEM"
          - "USER"
  - id: "delivery-settings"
    label: "Delivery Settings"
    description: "Configuration for how notifications are delivered."
    sortOrder: 200000
    fields:
      - path: "email/enabled"
        label: "Email Notifications"
        description: "Enable email notifications"
        type: "BOOLEAN"
        defaultValue: "true"
        sortOrder: 100000
        displayOn:
          - "SYSTEM"
          - "USER"
      - path: "push/enabled"
        label: "Push Notifications"
        description: "Enable push notifications"
        type: "BOOLEAN"
        defaultValue: "true"
        sortOrder: 200000
        displayOn:
          - "SYSTEM"
          - "USER"
      - path: "sms/enabled"
        label: "SMS Notifications"
        description: "Enable SMS notifications"
        type: "BOOLEAN"
        defaultValue: "false"
        sortOrder: 300000
        displayOn:
          - "SYSTEM"
          - "USER"

  - id: "system-config"
    label: "System Configuration"
    description: "System-wide notification settings."
    sortOrder: 300000
    fields:
      - path: "retry/attempts"
        label: "Retry Attempts"
        description: "Number of retry attempts for failed notifications"
        type: "INT"
        defaultValue: "3"
        sortOrder: 100000
        displayOn:
          - "SYSTEM"
      - path: "rate/limit"
        label: "Rate Limit"
        description: "Maximum notifications per hour per user"
        type: "INT"
        defaultValue: "100"
        sortOrder: 200000
        displayOn:
          - "SYSTEM"
      - path: "template/default"
        label: "Default Template"
        description: "Default notification template"
        type: "STRING"
        defaultValue: "default"
        sortOrder: 300000
        displayOn:
          - "SYSTEM"