# This file defines the configuration template for the "notification" service.
# It's used by the ConfigService to validate and provide metadata for UI rendering.

serviceName: "notification"

# A service can have multiple groups of configurations. Each group is a logical fieldset.
groups:
  - groupId: "subscriptions"
    description: "Configuration for user notification subscriptions."
    fields:
      - path: "promotion"
        label: "Promotions"
        description: "Receive promotional offers and news."
        type: "BOOLEAN"
        defaultValue: "true"
        displayOn:
          - "DEFAULT"
          - "USER"
      - path: "order"
        label: "Order Updates"
        description: "Receive updates about your orders."
        type: "BOOLEAN"
        defaultValue: "true"
        displayOn:
          - "DEFAULT"
          - "USER"
      - path: "system-alert"
        label: "System Alerts"
        description: "Receive critical alerts about system status."
        type: "BOOLEAN"
        defaultValue: "true"
        displayOn:
          - "DEFAULT"
          - "USER"
      - path: "system-update"
        label: "System Updates"
        description: "Receive notifications about new features and system updates."
        type: "BOOLEAN"
        defaultValue: "false"
        displayOn:
          - "DEFAULT"
          - "USER"
