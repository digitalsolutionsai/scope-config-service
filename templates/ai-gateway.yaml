service:
  id: "ai-gateway"
  label: "AI Gateway Service"

groups:
  - id: "openai-model"
    label: "OpenAI Model Configuration"
    description: "Configuration for OpenAI model integration."
    fields:
      - path: "enabled"
        label: "Enable OpenAI"
        description: "Enable or disable OpenAI model integration"
        type: "BOOLEAN"
        defaultValue: "true"
        displayOn:
          - "PROJECT"
      - path: "api-keys"
        label: "API Keys"
        description: "OpenAI API keys for round-robin load balancing"
        type: "SECRET"
        defaultValue: ""
        displayOn:
          - "PROJECT"
      - path: "base-url"
        label: "Base URL"
        description: "Custom base URL for OpenAI API (optional, leave empty for default)"
        type: "STRING"
        defaultValue: "https://api.openai.com/v1"
        displayOn:
          - "PROJECT"
      - path: "default-model"
        label: "Default Model"
        description: "Default OpenAI model to use"
        type: "STRING"
        defaultValue: "gpt-4o"
        options:
          - value: "gpt-4o"
            label: "GPT-4o"
          - value: "gpt-4o-mini"
            label: "GPT-4o Mini"
          - value: "gpt-4-turbo"
            label: "GPT-4 Turbo"
          - value: "gpt-3.5-turbo"
            label: "GPT-3.5 Turbo"
          - value: "o1-preview"
            label: "o1 Preview"
          - value: "o1-mini"
            label: "o1 Mini"
        displayOn:
          - "PROJECT"
      - path: "max-tokens"
        label: "Max Tokens"
        description: "Maximum number of tokens for completion"
        type: "INT"
        defaultValue: "4096"
        displayOn:
          - "PROJECT"
      - path: "temperature"
        label: "Temperature"
        description: "Sampling temperature (0.0 - 2.0)"
        type: "FLOAT"
        defaultValue: "0.7"
        displayOn:
          - "PROJECT"

  - id: "anthropic-model"
    label: "Anthropic Claude Configuration"
    description: "Configuration for Anthropic Claude model integration."
    fields:
      - path: "enabled"
        label: "Enable Anthropic"
        description: "Enable or disable Anthropic Claude model integration"
        type: "BOOLEAN"
        defaultValue: "false"
        displayOn:
          - "PROJECT"
      - path: "api-keys"
        label: "API Keys"
        description: "Anthropic API keys for round-robin load balancing"
        type: "SECRET"
        defaultValue: ""
        displayOn:
          - "PROJECT"
      - path: "base-url"
        label: "Base URL"
        description: "Custom base URL for Anthropic API (optional)"
        type: "STRING"
        defaultValue: "https://api.anthropic.com"
        displayOn:
          - "PROJECT"
      - path: "default-model"
        label: "Default Model"
        description: "Default Anthropic Claude model to use"
        type: "STRING"
        defaultValue: "claude-3-5-sonnet-20241022"
        options:
          - value: "claude-3-5-sonnet-20241022"
            label: "Claude 3.5 Sonnet"
          - value: "claude-3-5-haiku-20241022"
            label: "Claude 3.5 Haiku"
          - value: "claude-3-opus-20240229"
            label: "Claude 3 Opus"
          - value: "claude-3-sonnet-20240229"
            label: "Claude 3 Sonnet"
          - value: "claude-3-haiku-20240307"
            label: "Claude 3 Haiku"
        displayOn:
          - "PROJECT"
      - path: "max-tokens"
        label: "Max Tokens"
        description: "Maximum number of tokens for completion"
        type: "INT"
        defaultValue: "4096"
        displayOn:
          - "PROJECT"

  - id: "google-model"
    label: "Google Gemini Configuration"
    description: "Configuration for Google Gemini model integration."
    fields:
      - path: "enabled"
        label: "Enable Google Gemini"
        description: "Enable or disable Google Gemini model integration"
        type: "BOOLEAN"
        defaultValue: "false"
        displayOn:
          - "PROJECT"
      - path: "api-keys"
        label: "API Keys"
        description: "Google API keys for round-robin load balancing"
        type: "SECRET"
        defaultValue: ""
        displayOn:
          - "PROJECT"
      - path: "base-url"
        label: "Base URL"
        description: "Custom base URL for Google Gemini API (optional)"
        type: "STRING"
        defaultValue: ""
        displayOn:
          - "PROJECT"
      - path: "default-model"
        label: "Default Model"
        description: "Default Google Gemini model to use"
        type: "STRING"
        defaultValue: "gemini-1.5-pro"
        options:
          - value: "gemini-1.5-pro"
            label: "Gemini 1.5 Pro"
          - value: "gemini-1.5-flash"
            label: "Gemini 1.5 Flash"
          - value: "gemini-2.0-flash"
            label: "Gemini 2.0 Flash"
          - value: "gemini-pro"
            label: "Gemini Pro"
        displayOn:
          - "PROJECT"
      - path: "max-tokens"
        label: "Max Tokens"
        description: "Maximum number of tokens for completion"
        type: "INT"
        defaultValue: "8192"
        displayOn:
          - "PROJECT"

  - id: "azure-openai-model"
    label: "Azure OpenAI Configuration"
    description: "Configuration for Azure OpenAI model integration."
    fields:
      - path: "enabled"
        label: "Enable Azure OpenAI"
        description: "Enable or disable Azure OpenAI model integration"
        type: "BOOLEAN"
        defaultValue: "false"
        displayOn:
          - "PROJECT"
      - path: "api-keys"
        label: "API Keys"
        description: "Azure OpenAI API keys for round-robin load balancing"
        type: "SECRET"
        defaultValue: ""
        displayOn:
          - "PROJECT"
      - path: "endpoint"
        label: "Azure Endpoint"
        description: "Azure OpenAI resource endpoint URL"
        type: "STRING"
        defaultValue: ""
        displayOn:
          - "PROJECT"
      - path: "deployment-name"
        label: "Deployment Name"
        description: "Azure OpenAI deployment name"
        type: "STRING"
        defaultValue: ""
        displayOn:
          - "PROJECT"
      - path: "api-version"
        label: "API Version"
        description: "Azure OpenAI API version"
        type: "STRING"
        defaultValue: "2024-02-15-preview"
        displayOn:
          - "PROJECT"

  - id: "rate-limiting"
    label: "AI Gateway Rate Limiting"
    description: "Rate limiting configuration for AI model requests."
    fields:
      - path: "requests-per-minute"
        label: "Requests Per Minute"
        description: "Maximum requests per minute per project"
        type: "INT"
        defaultValue: "60"
        displayOn:
          - "PROJECT"
      - path: "tokens-per-minute"
        label: "Tokens Per Minute"
        description: "Maximum tokens per minute per project"
        type: "INT"
        defaultValue: "100000"
        displayOn:
          - "PROJECT"
      - path: "concurrent-requests"
        label: "Concurrent Requests"
        description: "Maximum concurrent requests per project"
        type: "INT"
        defaultValue: "10"
        displayOn:
          - "PROJECT"

  - id: "fallback-settings"
    label: "Fallback Settings"
    description: "Configuration for model fallback behavior."
    fields:
      - path: "enabled"
        label: "Enable Fallback"
        description: "Enable automatic fallback to alternative models on failure"
        type: "BOOLEAN"
        defaultValue: "true"
        displayOn:
          - "PROJECT"
      - path: "fallback-order"
        label: "Fallback Order"
        description: "JSON array defining model fallback priority"
        type: "JSON"
        defaultValue: '["openai", "anthropic", "google"]'
        displayOn:
          - "PROJECT"
      - path: "retry-attempts"
        label: "Retry Attempts"
        description: "Number of retry attempts before falling back"
        type: "INT"
        defaultValue: "2"
        displayOn:
          - "PROJECT"
