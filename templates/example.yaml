# This file defines the configuration template for the "webapp" service.
# It's used by the ConfigService to validate and provide metadata for UI rendering.

serviceName: "webapp"

# A service can have multiple groups of configurations. Each group is a logical fieldset.
groups:
  - groupId: "features"
    description: "Configuration for enabling or disabling application features."
    fields:
      - path: "enable-new-dashboard"
        label: "Enable New Dashboard"
        description: "Toggles the visibility of the new experimental dashboard."
        type: "BOOLEAN"
        defaultValue: "false"
        displayOn:
          - "PROJECT"
          - "STORE"

      - path: "enable-beta-analytics"
        label: "Enable Beta Analytics"
        description: "Enables the new analytics module, which is currently in beta."
        type: "BOOLEAN"
        defaultValue: "false"
        displayOn:
          - "PROJECT"

  - groupId: "security"
    description: "Settings related to user session and security."
    fields:
      - path: "session-timeout-seconds"
        label: "Session Timeout (seconds)"
        description: "The number of seconds of inactivity before a user is logged out."
        type: "INTEGER"
        defaultValue: "3600"
        displayOn:
          - "PROJECT"

      - path: "mfa-requirement"
        label: "Multi-Factor Authentication"
        description: "Policy for enforcing Multi-Factor Authentication."
        type: "STRING"
        defaultValue: "OPTIONAL"
        displayOn:
          - "PROJECT"
        # The 'options' field allows for creating a dropdown in a UI.
        options:
          - value: "DISABLED"
            label: "Disabled"
          - value: "OPTIONAL"
            label: "Optional for Users"
          - value: "MANDATORY"
            label: "Mandatory for All Users"
