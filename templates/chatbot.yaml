service:
  id: "chatbot"
  label: "Chatbot Service"

groups:
  - id: "general-settings"
    label: "General Settings"
    description: "General chatbot configuration settings."
    fields:
      - path: "bot-name"
        label: "Bot Name"
        description: "Display name for the chatbot"
        type: "STRING"
        defaultValue: "AI Assistant"
        displayOn:
          - "PROJECT"
      - path: "welcome-message"
        label: "Welcome Message"
        description: "Initial greeting message when user starts a conversation"
        type: "STRING"
        defaultValue: "Hello! How can I help you today?"
        displayOn:
          - "PROJECT"
      - path: "fallback-message"
        label: "Fallback Message"
        description: "Message displayed when the bot cannot understand the user input"
        type: "STRING"
        defaultValue: "I'm sorry, I didn't understand that. Could you please rephrase?"
        displayOn:
          - "PROJECT"
      - path: "language"
        label: "Language"
        description: "Primary language for the chatbot"
        type: "STRING"
        defaultValue: "en"
        options:
          - value: "en"
            label: "English"
          - value: "vi"
            label: "Vietnamese"
          - value: "zh"
            label: "Chinese"
          - value: "ja"
            label: "Japanese"
          - value: "ko"
            label: "Korean"
          - value: "es"
            label: "Spanish"
          - value: "fr"
            label: "French"
          - value: "de"
            label: "German"
        displayOn:
          - "PROJECT"
      - path: "enabled"
        label: "Enable Chatbot"
        description: "Enable or disable the chatbot service"
        type: "BOOLEAN"
        defaultValue: "true"
        displayOn:
          - "PROJECT"

  - id: "ai-model-settings"
    label: "AI Model Settings"
    description: "Configuration for the AI model used by the chatbot."
    fields:
      - path: "provider"
        label: "AI Provider"
        description: "Select the AI provider for the chatbot"
        type: "STRING"
        defaultValue: "openai"
        options:
          - value: "openai"
            label: "OpenAI"
          - value: "anthropic"
            label: "Anthropic Claude"
          - value: "google"
            label: "Google Gemini"
          - value: "azure"
            label: "Azure OpenAI"
        displayOn:
          - "PROJECT"
      - path: "model"
        label: "Model Name"
        description: "Specific model to use (e.g., gpt-4o, claude-3-5-sonnet)"
        type: "STRING"
        defaultValue: "gpt-4o-mini"
        displayOn:
          - "PROJECT"
      - path: "temperature"
        label: "Temperature"
        description: "Controls randomness in responses (0.0 - 2.0)"
        type: "FLOAT"
        defaultValue: "0.7"
        displayOn:
          - "PROJECT"
      - path: "max-tokens"
        label: "Max Response Tokens"
        description: "Maximum tokens in the AI response"
        type: "INT"
        defaultValue: "1024"
        displayOn:
          - "PROJECT"
      - path: "system-prompt"
        label: "System Prompt"
        description: "System prompt to set the chatbot's behavior and personality"
        type: "STRING"
        defaultValue: "You are a helpful AI assistant. Be concise, accurate, and friendly in your responses."
        displayOn:
          - "PROJECT"

  - id: "conversation-settings"
    label: "Conversation Settings"
    description: "Settings for conversation management and history."
    fields:
      - path: "history/max-messages"
        label: "Max History Messages"
        description: "Maximum number of messages to keep in conversation history"
        type: "INT"
        defaultValue: "20"
        displayOn:
          - "PROJECT"
      - path: "history/retention-days"
        label: "History Retention (Days)"
        description: "Number of days to retain conversation history"
        type: "INT"
        defaultValue: "30"
        displayOn:
          - "PROJECT"
      - path: "session/timeout-minutes"
        label: "Session Timeout (Minutes)"
        description: "Minutes of inactivity before session expires"
        type: "INT"
        defaultValue: "30"
        displayOn:
          - "PROJECT"
      - path: "typing-indicator"
        label: "Show Typing Indicator"
        description: "Display typing indicator while bot is generating response"
        type: "BOOLEAN"
        defaultValue: "true"
        displayOn:
          - "PROJECT"

  - id: "rate-limits"
    label: "Rate Limits"
    description: "Rate limiting settings to control usage."
    fields:
      - path: "messages-per-minute"
        label: "Messages Per Minute"
        description: "Maximum messages per user per minute"
        type: "INT"
        defaultValue: "20"
        displayOn:
          - "PROJECT"
      - path: "messages-per-day"
        label: "Messages Per Day"
        description: "Maximum messages per user per day"
        type: "INT"
        defaultValue: "500"
        displayOn:
          - "PROJECT"
      - path: "max-input-length"
        label: "Max Input Length"
        description: "Maximum character length for user input"
        type: "INT"
        defaultValue: "4000"
        displayOn:
          - "PROJECT"

  - id: "moderation-settings"
    label: "Content Moderation"
    description: "Settings for content moderation and safety."
    fields:
      - path: "enabled"
        label: "Enable Moderation"
        description: "Enable content moderation for user inputs and bot responses"
        type: "BOOLEAN"
        defaultValue: "true"
        displayOn:
          - "PROJECT"
      - path: "block-profanity"
        label: "Block Profanity"
        description: "Filter and block profane content"
        type: "BOOLEAN"
        defaultValue: "true"
        displayOn:
          - "PROJECT"
      - path: "block-pii"
        label: "Block PII Detection"
        description: "Detect and warn about personally identifiable information"
        type: "BOOLEAN"
        defaultValue: "true"
        displayOn:
          - "PROJECT"
      - path: "blocked-topics"
        label: "Blocked Topics"
        description: "Comma-separated list of topics the bot should not discuss"
        type: "ARRAY_STRING"
        defaultValue: ""
        displayOn:
          - "PROJECT"

  - id: "webhook-settings"
    label: "Webhook Integration"
    description: "Webhook configuration for external integrations."
    fields:
      - path: "url"
        label: "Webhook URL"
        description: "URL to send conversation events"
        type: "STRING"
        defaultValue: ""
        displayOn:
          - "PROJECT"
      - path: "secret"
        label: "Webhook Secret"
        description: "Secret key for webhook signature verification"
        type: "SECRET"
        defaultValue: ""
        displayOn:
          - "PROJECT"
      - path: "events"
        label: "Webhook Events"
        description: "Events to trigger webhook notifications"
        type: "JSON"
        defaultValue: '["conversation.started", "conversation.ended", "message.received"]'
        displayOn:
          - "PROJECT"
      - path: "enabled"
        label: "Enable Webhooks"
        description: "Enable webhook notifications"
        type: "BOOLEAN"
        defaultValue: "false"
        displayOn:
          - "PROJECT"

  - id: "ui-customization"
    label: "UI Customization"
    description: "Customization options for the chatbot UI widget."
    fields:
      - path: "theme/primary-color"
        label: "Primary Color"
        description: "Primary color for the chat widget (hex code)"
        type: "STRING"
        defaultValue: "#0066FF"
        displayOn:
          - "PROJECT"
      - path: "theme/avatar-url"
        label: "Bot Avatar URL"
        description: "URL for the bot's avatar image"
        type: "STRING"
        defaultValue: ""
        displayOn:
          - "PROJECT"
      - path: "position"
        label: "Widget Position"
        description: "Position of the chat widget on the page"
        type: "STRING"
        defaultValue: "bottom-right"
        options:
          - value: "bottom-right"
            label: "Bottom Right"
          - value: "bottom-left"
            label: "Bottom Left"
          - value: "top-right"
            label: "Top Right"
          - value: "top-left"
            label: "Top Left"
        displayOn:
          - "PROJECT"
      - path: "show-branding"
        label: "Show Branding"
        description: "Display branding in the chat widget"
        type: "BOOLEAN"
        defaultValue: "true"
        displayOn:
          - "PROJECT"
